<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>앱 사용자 현황 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:   #F2F1EE;
  --s0:   #FFFFFF;
  --s1:   #F7F6F3;
  --s2:   #EEECEA;
  --t1:   #18181A;
  --t2:   #6B6966;
  --t3:   #A8A6A2;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--t1);
  font-size: 12px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.hdr {
  background: var(--s0);
  height: 54px;
  display: flex;
  align-items: center;
  padding: 0 36px;
  gap: 20px;
  position: sticky;
  top: 0;
  z-index: 200;
}
.hdr-logo  { font-size: 13px; font-weight: 700; color: var(--t1); letter-spacing: -.2px; }
.hdr-sep   { width: 1px; height: 16px; background: var(--s2); }
.hdr-meta  { font-size: 11px; color: var(--t3); }
.hdr-right { margin-left: auto; display:flex; align-items:center; gap:16px; }
.hdr-badge {
  font-size: 10px; font-weight: 700;
  padding: 4px 10px; border-radius: 99px;
  background: #FEE2E2;
  color: #B91C1C;
  letter-spacing: .04em;
}
.hdr-date  { font-size: 11px; color: var(--t3); }

/* ── KPI STRIP ── */
.kpi-strip {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  background: var(--s0);
  gap: 0;
  margin-bottom: 4px;
}
.kpi {
  padding: 14px 24px;
  background: var(--s0);
  position: relative;
}
.kpi + .kpi::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; bottom: 20%;
  width: 1px;
  background: var(--s2);
}
.kpi-label { font-size: 10px; color: var(--t3); letter-spacing: .05em; margin-bottom: 5px; }
.kpi-val   { font-size: 22px; font-weight: 700; color: var(--t1); letter-spacing: -.5px; line-height:1; margin-bottom: 5px; }
.kpi-sub   { font-size: 11px; color: var(--t2); display:flex; align-items:center; gap:4px; }
.kpi-chg   { font-size: 11px; font-weight: 500; }
.up   { color: #16A34A; }
.dn   { color: #DC2626; }
.neu  { color: var(--t3); }

/* ── MAIN ── */
main { padding: 20px 36px 60px; max-width: 1400px; margin: 0 auto; }

.sec-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.sec-num   { font-size: 10px; font-weight: 700; color: var(--t3); letter-spacing:.1em; }
.sec-title { font-size: 13px; font-weight: 700; color: var(--t1); }
.sec-rule  { flex:1; height:1px; background: var(--s2); }
.sec-note  { font-size: 11px; color: var(--t3); }

/* ── TABS ── */
.tab-wrap {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  background: var(--s0);
  border-radius: 10px 10px 0 0;
  overflow: hidden;
  gap: 0;
}
.tab-btn {
  padding: 12px 10px 10px;
  text-align: center;
  cursor: pointer;
  background: var(--s0);
  transition: background .15s;
  position: relative;
}
.tab-btn:hover { background: var(--s1); }
.tab-btn.active { background: var(--s0); }
.tb-label  { font-size: 12px; font-weight: 500; color: var(--t2); display:block; }
.tab-btn.active .tb-label { font-weight: 700; }
.tb-period { font-size: 10px; color: var(--t3); display: block; margin-top: 1px; }
.tb-count  { font-size: 11px; font-weight: 700; display: block; margin-top: 3px; }
.tb-bar    { position:absolute; bottom:0; left:0; right:0; height:3px; background:transparent; border-radius:3px 3px 0 0; }

/* ── LC CONTEXT ── */
.lc-ctx {
  padding: 10px 16px;
  font-size: 11px; color: var(--t2); line-height: 1.6;
  background: var(--s0);
  border-top: 2px solid var(--s2);
}

/* ── MATRIX WRAP ── */
.matrix-outer {
  background: var(--bg);
  border-radius: 0 0 10px 10px;
  padding: 12px;
  margin-bottom: 6px;
  background: var(--s0);
}
.matrix {
  display: grid;
  grid-template-columns: 72px repeat(3, 1fr);
  gap: 6px;
}

/* Column & Row headers */
.col-hdr {
  background: var(--s1);
  border-radius: 8px;
  padding: 10px 8px;
  text-align: center;
}
.col-hdr-name { font-size: 11px; font-weight: 700; color: var(--t1); margin-bottom: 2px; }
.col-hdr-sub  { font-size: 10px; color: var(--t3); margin-bottom: 7px; }
.col-hdr-tags { display:flex; gap:3px; justify-content:center; flex-wrap:wrap; }
.type-tag     { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 99px; }

.row-hdr {
  display: flex; flex-direction: column;
  align-items: flex-end; justify-content: center;
  gap: 4px; padding-right: 4px;
}
.row-badge {
  font-size: 10px; font-weight: 700;
  padding: 4px 9px; border-radius: 99px;
  white-space: nowrap;
}
.row-sub   { font-size: 9px; color: var(--t3); text-align:right; }
.row-churn { font-size: 9px; color: var(--t3); text-align:right; line-height:1.4; }

/* ── CELL ── */
.cell {
  border-radius: 8px;
  padding: 12px 13px;
  position: relative;
  animation: cellIn .25s ease both;
  min-height: 100px;
  cursor: default;
}
@keyframes cellIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
.cell.is-anomaly { animation: cellIn .25s ease both, glw 3s ease-in-out infinite; }
@keyframes glw {
  0%,100%{ box-shadow:none; }
  50%    { box-shadow: 0 0 0 3px rgba(220,38,38,.12); }
}

.cell-top  { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.st-badge  { font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 99px; letter-spacing:.02em; }
.cell-sig  { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.cell-sig.blink { animation: blink 1.8s ease-in-out infinite; }

.cell-count { font-size: 20px; font-weight: 700; letter-spacing:-.5px; line-height:1; margin-bottom:4px; }
.cell-mom   { font-size: 10px; font-weight: 500; margin-bottom:6px; display:flex; align-items:center; gap:3px; }
.cell-name  { font-size: 10px; line-height:1.35; opacity:.7; }

/* STATUS CELL COLORS — background only, no borders */
.c-best    { background:#DCFCE7; color:#166534; }
.c-best    .st-badge { background:#BBF7D0; color:#15803D; }

.c-good    { background:#CCFBF1; color:#0F766E; }
.c-good    .st-badge { background:#99F6E4; color:#0D9488; }

.c-normal  { background:#F1F0ED; color:#6B6966; }
.c-normal  .st-badge { background:#E4E2DC; color:#8A8880; }

.c-watch   { background:#DBEAFE; color:#1E40AF; }
.c-watch   .st-badge { background:#BFDBFE; color:#1D4ED8; }

.c-warning { background:#FEF3C7; color:#92400E; }
.c-warning .st-badge { background:#FDE68A; color:#B45309; }

.c-danger  { background:#FFE4E6; color:#9F1239; }
.c-danger  .st-badge { background:#FECDD3; color:#BE123C; }

.c-anomaly { background:#FEE2E2; color:#7F1D1D; }
.c-anomaly .st-badge { background:#DC2626; color:#FFFFFF; }

/* ── LEGEND ── */
.legend {
  display: flex; align-items:center; gap:12px; flex-wrap:wrap;
  padding: 10px 0 20px;
}
.leg { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--t2); }
.leg-swatch { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
.leg-sep { width:1px; height:12px; background:var(--s2); margin:0 4px; }

/* ── BOTTOM PANELS ── */
.bottom-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:4px; }
.panel {
  background: var(--s0);
  border-radius: 10px;
  padding: 18px 20px;
}
.panel-title {
  font-size: 12px; font-weight: 700; color: var(--t1);
  margin-bottom: 14px;
  display: flex; align-items:center; gap:8px;
}
.pt-badge {
  font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius:99px;
}

/* Anomaly list */
.anomaly-list { display:flex; flex-direction:column; gap:5px; }
.anomaly-row  {
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  align-items: center;
  gap: 10px;
  padding: 9px 11px;
  border-radius: 8px;
  background: var(--s1);
}
.ar-status { font-size:9px; font-weight:700; padding:3px 7px; border-radius:99px; white-space:nowrap; }
.ar-info   { display:flex; flex-direction:column; gap:1px; }
.ar-seg    { font-size:11px; font-weight:500; color:var(--t1); }
.ar-desc   { font-size:10px; color:var(--t2); }
.ar-count  { font-size:12px; font-weight:700; text-align:right; color:var(--t1); }
.ar-mom    { font-size:10px; font-weight:500; text-align:right; white-space:nowrap; min-width:48px; }

/* Flow list */
.flow-list { display:flex; flex-direction:column; gap:5px; }
.flow-row  {
  display: grid;
  grid-template-columns: 1fr 24px 1fr auto;
  align-items: center;
  gap: 6px;
  padding: 9px 11px;
  border-radius: 8px;
  background: var(--s1);
}
.flow-cell .fc-seg { font-size:11px; font-weight:500; color:var(--t1); display:block; }
.flow-cell .fc-lc  { font-size:10px; color:var(--t3); display:block; }
.flow-arrow        { text-align:center; font-size:13px; color:var(--t3); }
.flow-count .fn    { font-size:12px; font-weight:700; display:block; text-align:right; }
.flow-count .fm    { font-size:10px; display:block; text-align:right; }
</style>
</head>

    },

    },
  },
  churned:{

      value:  {s:'anomaly',n:'VIP 이탈',            sig:'a',  cnt:3200,  mom:+12.8},
    },
    casual:{
      passive:{s:'danger', n:'일반 이탈',           sig:null, cnt:48200, mom:+3.6},
      mixed:  {s:'danger', n:'중간 가치 이탈',      sig:null, cnt:32400, mom:+2.8},
      value:  {s:'danger', n:'기능형 이탈',         sig:'a',  cnt:18600, mom:+6.4},
    },
    light:{
      passive:{s:'warning',n:'저관여 이탈',         sig:null, cnt:62800, mom:+1.2},
      mixed:  {s:'watch',  n:'경계 이탈',           sig:null, cnt:28400, mom:-0.8},
      value:  {s:'watch',  n:'잠재 복귀 가능',      sig:null, cnt:12200, mom:-2.4},
    },

const ANOMALIES = [
  {st:'anomaly', seg:'성숙 · 파워 + 확인형',    desc:'장기 파워 유저 확인형 고착',  cnt:42800,  mom:-8.2},
  {st:'danger',  seg:'성숙 · 라이트 + 확인형',  desc:'이탈 임박 — 대규모 군집',     cnt:98200,  mom:-12.1},
  {st:'anomaly', seg:'성장 · 파워 + 확인형',    desc:'성장기 확인형 고착 조기 경보', cnt:18400,  mom:-3.2},
  {st:'anomaly', seg:'이탈 · 파워 + 탐색실행형',desc:'VIP 이탈 — 최우선 대응',      cnt:3200,   mom:+12.8},
  {st:'warning', seg:'신규 · 라이트 + 확인형',  desc:'온보딩 이탈 전조',             cnt:18600,  mom:-2.4},
];

const FLOWS = [
  {from:'라이트+확인형',  to:'이탈',          cnt:-9420, type:'dn', lc:'성숙'},
  {from:'파워+확인형',    to:'캐쥬얼+확인형', cnt:-6240, type:'dn', lc:'성숙'},
  {from:'캐쥬얼+혼합',    to:'파워+혼합',     cnt:+4180, type:'up', lc:'성장'},
  {from:'라이트+확인형',  to:'이탈',          cnt:-7840, type:'dn', lc:'성장'},
  {from:'캐쥬얼+탐색형',  to:'파워+탐색형',   cnt:+2640, type:'up', lc:'성숙'},
];

function fmt(n)  { return Math.abs(n).toLocaleString('ko-KR'); }

function fmtMom(m, good) {
  const up  = m >= 0;
  const arr = up ? '▲' : '▼';
  const sgn = up ? '+' : '';
  let cls = '';
  if (good)  cls = up ? 'up' : 'dn';
  else       cls = up ? 'dn' : 'up';
  return `<span class="${cls}">${arr} ${sgn}${Math.abs(m).toFixed(1)}%</span>`;
}

function computeKpi(lcId) {
  const rows = DATA[lcId];
  let total=0, dangerU=0, bestU=0, anomC=0;
  FREQS.forEach(fr => FEATS.forEach(fe => {
    const c = rows[fr.id][fe.id];
    total   += c.cnt;
    if (!ST[c.s].good) dangerU += c.cnt;
    if (c.s==='best'||c.s==='good') bestU += c.cnt;
    if (c.s==='anomaly') anomC++;
  }));
  return {total, dangerU, bestU, anomC};
}

function renderKpi(lcId) {
  const lc = LC.find(l=>l.id===lcId);
  const {total,dangerU,bestU,anomC} = computeKpi(lcId);
  const momMap = {new:+14.2,growth:+2.4,mature:-4.8,return:+38.6,churned:+3.2};
  const mom = momMap[lcId];
  const mc  = mom>=0?'up':'dn';
  const ma  = mom>=0?'▲':'▼';

  document.getElementById('kpiStrip').innerHTML = `
    <div class="kpi">
      <div class="kpi-label">분석 대상 (${lc.label})</div>
      <div class="kpi-val">${total.toLocaleString()}</div>
      <div class="kpi-sub">
        <span class="kpi-chg ${mc}">${ma} ${Math.abs(mom).toFixed(1)}%</span>
        <span>vs 전월</span>
      </div>
    </div>
    <div class="kpi">
      <div class="kpi-label">이상징후 셀</div>
      <div class="kpi-val" style="color:#DC2626;">${anomC}개</div>
      <div class="kpi-sub" style="color:var(--t3);">즉각 대응 필요</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">위험·이상 사용자</div>
      <div class="kpi-val">${dangerU.toLocaleString()}</div>
      <div class="kpi-sub" style="color:#D97706;">${((dangerU/total)*100).toFixed(1)}% of ${lc.label}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">건강·최적 사용자</div>
      <div class="kpi-val" style="color:#16A34A;">${bestU.toLocaleString()}</div>
      <div class="kpi-sub" style="color:var(--t3);">${((bestU/total)*100).toFixed(1)}% of ${lc.label}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">전체 누적 사용자</div>
      <div class="kpi-val">1,117,000</div>
      <div class="kpi-sub"><span class="kpi-chg dn">▼ 2.1%</span><span>vs 전월</span></div>
    </div>`;
}

function renderTabs(cur) {
  document.getElementById('tabWrap').innerHTML = LC.map(lc => {
    const {total} = computeKpi(lc.id);
    const active  = lc.id === cur;
    return `
      <div class="tab-btn ${active?'active':''}" onclick="go('${lc.id}')">
        <span class="tb-label" style="${active?`color:${lc.color};`:''}">
          ${lc.label}
        </span>
        <span class="tb-period">${lc.period}</span>
        <span class="tb-count" style="color:${active?lc.color:'var(--t3)'};">
          ${total.toLocaleString()}명
        </span>
        <div class="tb-bar" style="background:${active?lc.color:'transparent'};"></div>
      </div>`;
  }).join('');
}

function renderCtx(lcId) {
  const lc = LC.find(l=>l.id===lcId);
  const ctx = document.getElementById('lcCtx');
  ctx.style.background   = lc.ctxbg;
  ctx.style.borderTopColor = lc.ctxleft;
  ctx.innerHTML = `<strong style="color:${lc.color};">${lc.label} 단계</strong>&ensp;${lc.desc}`;
}

function renderMatrix(lcId) {
  const isChurned = lcId === 'churned';
  const cells = ['<div></div>'];

  FEATS.forEach(f => {
    const tags = f.tags.map(t =>
      `<span class="type-tag" style="background:${t.bg};color:${t.tc};">${t.t}</span>`).join('');
    cells.push(`
      <div class="col-hdr">
        <div class="col-hdr-name">${f.label}</div>
        <div class="col-hdr-sub">${f.sub}</div>
        <div class="col-hdr-tags">${tags}</div>
      </div>`);
  });

  FREQS.forEach((fr, ri) => {
    cells.push(`
      <div class="row-hdr">
        <span class="row-badge" style="background:${fr.bg};color:${fr.tx};">${fr.label}</span>
        <span class="row-sub">${fr.sub}</span>
        ${isChurned?'<div class="row-churn">이탈 전<br>마지막 세그</div>':''}
      </div>`);

    FEATS.forEach((fe, fi) => {
      const c  = DATA[lcId][fr.id][fe.id];
      const st = ST[c.s];
      const isA = c.s === 'anomaly';
      const delay = (ri*3+fi) * 0.03;
      const sigEl = c.sig==='a'
        ? `<div class="cell-sig blink" style="background:#DC2626;"></div>`
        : c.sig==='o'
          ? `<div class="cell-sig" style="background:#16A34A;"></div>`
          : '';

      cells.push(`
        <div class="cell ${st.cls} ${isA?'is-anomaly':''}"
             style="animation-delay:${delay}s;">
          <div class="cell-top">
            <span class="st-badge">${st.l}</span>
            ${sigEl}
          </div>
          <div class="cell-count">${fmt(c.cnt)}</div>
          <div class="cell-mom">
            ${fmtMom(c.mom, st.good)}
            <span style="color:var(--t3);font-size:9px;">vs 전월</span>
          </div>
          <div class="cell-name">${c.n}</div>
        </div>`);
    });
  });

  document.getElementById('matrix').innerHTML = cells.join('');
}

function renderAnomalies() {
  document.getElementById('anomalyList').innerHTML = ANOMALIES.map(a => {
    const st   = ST[a.st];
    const up   = a.mom >= 0;
    const good = st.good;
    const cls  = (good ? up : !up) ? 'up' : 'dn';
    const arr  = up ? '▲' : '▼';
    return `
      <div class="anomaly-row">
        <span class="ar-status" style="background:${st.bbg};color:${st.btx};">${st.l}</span>
        <div class="ar-info">
          <span class="ar-seg">${a.seg}</span>
          <span class="ar-desc">${a.desc}</span>
        </div>
        <div class="ar-count">${a.cnt.toLocaleString()}명</div>
        <div class="ar-mom">
          <span class="${cls}">${arr} ${Math.abs(a.mom).toFixed(1)}%</span>
        </div>
      </div>`;
  }).join('');
}

function renderFlows() {
  document.getElementById('flowList').innerHTML = FLOWS.map(f => {
    const isDn = f.type === 'dn';
    const cls  = isDn ? 'dn' : 'up';
    const sign = isDn ? '' : '+';
    return `
      <div class="flow-row">
        <div class="flow-cell">
          <span class="fc-seg">${f.from}</span>
          <span class="fc-lc">${f.lc}</span>
        </div>
        <div class="flow-arrow">→</div>
        <div class="flow-cell">
          <span class="fc-seg">${f.to}</span>
        </div>
        <div class="flow-count">
          <span class="fn ${cls}">${sign}${Math.abs(f.cnt).toLocaleString()}명</span>
        </div>
      </div>`;
  }).join('');
}

let cur = 'mature';
function go(id) {
  cur = id;
  renderKpi(cur); renderTabs(cur); renderCtx(cur); renderMatrix(cur);
}

renderKpi(cur); renderTabs(cur); renderCtx(cur); renderMatrix(cur);
renderAnomalies(); renderFlows();
</script>
</body>
